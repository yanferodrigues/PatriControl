{% extends "base.html" %}
{% load static %}
{% block content %}
            <nav class="navegacao-aside">
                <a href="{% url 'index' %}">
                    <img class="icon" src="{% static 'assets/icones/dashboard_branco.png' %}" alt="dashboard">
                    Dashboard
                </a>
                <div class="nav-grupo">
                    <button class="nav-grupo-cabeca">
                        <img class="icon" src="{% static 'assets/icones/patrimonio_branco.png' %}" alt="ativos">
                        Ativos
                        <span class="nav-grupo-seta">▾</span>
                    </button>
                    <div class="nav-grupo-itens">
                        <a href="{% url 'ativos' %}">Visualizar</a>
                        <a class="link-ativo" href="{% url 'novo-ativo' %}">Criar</a>
                    </div>
                </div>
                <div class="nav-grupo">
                    <button class="nav-grupo-cabeca">
                        <img class="icon" src="{% static 'assets/icones/imovel_branco.png' %}" alt="investimentos">
                        Investimentos
                        <span class="nav-grupo-seta">▾</span>
                    </button>
                    <div class="nav-grupo-itens">
                        <a href="{% url 'investimentos' %}">Visualizar</a>
                        <a href="{% url 'novo-investimento' %}">Criar</a>
                    </div>
                </div>
                <div class="nav-grupo">
                    <button class="nav-grupo-cabeca">
                        <img class="icon" src="{% static 'assets/icones/patrimonio_branco.png' %}" alt="categorias">
                        Categorias
                        <span class="nav-grupo-seta">▾</span>
                    </button>
                    <div class="nav-grupo-itens">
                        <a href="{% url 'categorias' %}">Visualizar</a>
                        <a href="{% url 'nova-categoria' %}">Criar</a>
                    </div>
                </div>
                <div class="nav-grupo">
                    <button class="nav-grupo-cabeca">
                        <img class="icon" src="{% static 'assets/icones/patrimonio_branco.png' %}" alt="filiais">
                        Filiais
                        <span class="nav-grupo-seta">▾</span>
                    </button>
                    <div class="nav-grupo-itens">
                        <a href="{% url 'filiais' %}">Visualizar</a>
                        <a href="{% url 'nova-filial' %}">Criar</a>
                    </div>
                </div>
            </nav>
        </aside>
        <main class="aparecer-baixo">
            <form action="{% url 'novo-ativo'%}" method="POST">
                {% csrf_token %}
                <div id="card-upload-foto">
                    <label class="upload-box">
                        <input type="file" accept="image/*" id="inputFoto">

                        <img id="preview" class="preview-img">

                        <div class="conteudo-upload" id="textoUpload">
                            <img src="{% static 'assets/icones/adicionar imagem.png' %}" alt="adicionar imagem">
                            <p>Adicionar foto do ativo</p>
                        </div>
                    </label>
                </div>
            
                <div class="informacoes-patrimonio-card">
                    <p class="titulo-medio">Informações Básicas</p>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="input-codigo-ativo">Código *</label>
                            <input class="input-grande" name="input-codigo-ativo" id="input-codigo-ativo" type="text" placeholder="Ex: IS000001" required>
                        </div>
                        <div>
                            <label class="label-inputs" for="input-descricao-ativo">Descrição (Tipo) *</label>
                            <input class="input-grande" name="input-descricao-ativo" id="input-descricao-ativo" type="text" placeholder="Ex: Trator" required>
                        </div>
                    </div>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="input-chassi-ativo">Chassi/Nº de Série</label>
                            <input class="input-grande" name="input-chassi-ativo" id="input-chassi-ativo" type="text" placeholder="HCCS9845322IH43">
                        </div>
                        <div>
                            <label class="label-inputs" for="input-placa-ativo">Placa</label>
                            <input class="input-grande" name="input-placa-ativo" id="input-placa-ativo" type="text" placeholder="Ex: TGH0P98">
                        </div>
                    </div>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="input-adesivado-ativo">Adesivado *</label>
                            <select class="input-grande" name="input-adesivado-ativo" id="input-adesivado-ativo" type="text" required>
                                <option value="0" selected>Não adesivado</option>
                                <option value="1">Adesivado</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-inputs" for="input-auxiliar-ativo">Código auxiliar</label>
                            <input class="input-grande" name="input-auxiliar-ativo" id="input-auxiliar-ativo" type="text" placeholder="Ex: VEI-065">
                        </div>
                    </div>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="input-cor-ativo">Cor primária</label>
                            <input class="input-grande" name="input-cor-ativo" id="input-cor-ativo" type="text" placeholder="Ex: Trator">
                        </div>
                        <div>
                            <label class="label-inputs" for="select-categoria-ativo">Categoria *</label>
                            <select class="input-grande" name="select-categoria-ativo" id="select-categoria-ativo" required>
                                <option disabled hidden selected></option>
                                {% for cat in categorias %}
                                    <option value="{{ cat.nome }}">{{ cat.nome|title }}</option>
                                {% empty %}
                                    <option disabled>Nenhuma categoria cadastrada</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div>
                            <label class="label-inputs" for="select-status-ativo">Status *</label>
                            <select class="input-grande" name="select-status-ativo" id="select-status-ativo" required>
                                <option value="1" selected>Ativo</option>
                                <option value="0">Inativo</option>
                            </select>
                        </div>
                    </div>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="textarea-detalhamento-ativo">Detalhamento</label>
                            <textarea class="textarea-grande" name="textarea-detalhamento-ativo" id="textarea-detalhamento-ativo" placeholder="Informações extras..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="informacoes-patrimonio-card">
                    <p class="titulo-medio">Localização/Responsável</p>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="input-localizacao-ativo">Localização *</label>
                            <select class="input-grande" name="input-localizacao-ativo" id="input-localizacao-ativo" type="text" required>
                                <option selected hidden></option>
                                {% for filial in filiais %}
                                    <option value="{{ filial.nome }}">{{ filial.nome|title }}</option>
                                {% empty %}
                                    <option disabled>Nenhuma filial cadastrada</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="label-inputs" for="input-responsavel-ativo">Responsável</label>
                            <input class="input-grande" name="input-responsavel-ativo" id="input-responsavel-ativo" type="text" placeholder="Ex: Yan Felipe">
                        </div>
                    </div>
                </div>
                <div class="informacoes-patrimonio-card">
                    <p class="titulo-medio">Informações Financeiras</p>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="input-data-ativo">Data de incorporação</label>
                            <input class="input-grande" name="input-data-ativo" id="input-data-ativo" type="date" placeholder="Ex: 15/03/2025">
                        </div>
                        <div>
                            <label class="label-inputs" for="input-responsavel-ativo">Fornecedor</label>
                            <input class="input-grande" name="input-fornecedor-ativo" id="input-responsavel-ativo" type="text" placeholder="Ex: Bombas Tigre Ltda">
                        </div>
                        <div>
                            <label class="label-inputs" for="input-responsavel-ativo">Nº da NF</label>
                            <input class="input-grande" name="input-numero-nf-ativo" id="input-responsavel-ativo" type="number" placeholder="Ex: 026">
                        </div>
                    </div>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="input-valor-ativo">Valor</label>
                            <input class="input-grande" name="input-valor-ativo" id="input-valor-ativo" type="number" placeholder="R$">
                        </div>
                        <div class="upload-nota-fiscal">
                            <label class="label-inputs" for="input-nota-ativo">Nota Fiscal</label>
                            <label class="campo-upload-nota" name="input-nota-ativo" id="input-nota-ativo">
                                <img src="{% static 'assets/icones/adicionar imagem.png' %}" alt="add file">
                                <input name="input-nota-fiscal-ativo" id="input-nota" type="file" accept="application/pdf">
                            </label>
                            <button type="button" onclick="visualizarNota()">Vizualizar nota fiscal</button>
                            <button type="button" onclick="excluirNota()">Excluir nota fiscal</button>
                        </div>
                    </div>
                </div>
                <div style="display:flex; justify-content: center; align-items: center; gap:15px;">
                    <button type="submit" class="botao-editar"> Salvar </button>
                    <a href="{% url 'ativos' %}" class="botao-excluir"> Cancelar </a>
                </div>
                
            </form>
            
        </main>
    </div>
    
    <script src="{% static 'assets/js/novo patrimonio.js' %}"></script>
    <script src="{% static 'assets/js/geral.js' %}"></script>
{% endblock content %}
