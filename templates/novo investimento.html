{% extends "base.html" %}
{% load static %}
{% block content %}
            <nav class="navegacao-aside">
                <a href="{% url 'index' %}">
                    <img class="icon" src="{% static 'assets/icones/dashboard_branco.png' %}" alt="dashboard">
                    Dashboard
                </a>
                <a href="{% url 'ativos' %}">
                    <img class="icon" src="{% static 'assets/icones/patrimonio_branco.png' %}" alt="patrimonio">
                    Ativos
                </a>
                <a href="{% url 'novo-ativo' %}">
                    <img class="icon" src="{% static 'assets/icones/adicionar_branco.png' %}" alt="novo patrimonio">
                    Novo Ativo
                </a>
                <a href="{% url 'investimentos' %}">
                    <img class="icon" src="{% static 'assets/icones/imovel_branco.png' %}" alt="patrimonio">
                    Investimentos
                </a>
                <a class="link-ativo" href="{% url 'novo-investimento' %}">
                    <img class="icon" src="{% static 'assets/icones/adicionar_branco.png' %}" alt="novo patrimonio">
                    Novo Investimento
                </a>
            </nav>
        </aside>
        <main class="aparecer-baixo">
            <form action="{% url 'novo-investimento' %}" method="POST">
                {% csrf_token %}
                <div class="informacoes-patrimonio-card">
                    <p class="titulo-medio">Informações Básicas</p>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="input-codigo-investimento">Código *</label>
                            <input class="input-grande" name="input-codigo-investimento" id="input-codigo-investimento" type="text" placeholder="Ex: INV-123" required>
                        </div>
                        <div>
                            <label class="label-inputs" for="input-descricao-investimento">Descrição *</label>
                            <input class="input-grande" name="input-descricao-investimento" id="input-descricao-investimento" type="text" placeholder="Ex: Poços artesianos" required>
                        </div>
                        <div>
                            <label class="label-inputs" for="select-status-investimento">Status *</label>
                            <select class="input-grande" name="select-status-investimento" id="select-status-investimento" required>
                                <option value="1" selected>Ativo</option>
                                <option value="0">Inativo</option>
                            </select>
                        </div>
                    </div>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="textarea-detalhamento-investimento">Detalhamento</label>
                            <textarea class="textarea-grande" name="textarea-detalhamento-investimento" id="textarea-detalhamento-investimento" placeholder="Informações extras..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="informacoes-patrimonio-card">
                    <p class="titulo-medio">Localização/Data de icorporação</p>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="input-localizacao-investimento">Localização *</label>
                            <select class="input-grande" name="input-localizacao-investimento" id="input-localizacao-investimento" type="text" required>
                                <option selected hidden></option>
                                <option value="SANTA LUCIA">Santa Lúcia</option>
                                <option value="GRANDE LESTE">Grande Leste</option>
                                <option value="SANTO EXPEDITO">Santo Expedito</option>
                                <option value="JATOBA">Jatobá</option>
                                <option value="ESCRITORIO CENTRAL">Escritório Central</option>
                                <option value="UBA">UBA</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-inputs" for="input-data-investimento">Data inicial</label>
                            <input class="input-grande" name="input-data-investimento" id="input-data-investimento" type="date" placeholder="">
                        </div>
                    </div>
                </div>
                <div class="informacoes-patrimonio-card">
                    <p class="titulo-medio">Informações Financeiras</p>
                    <div class="box-inputs">
                        <div>
                            <label class="label-inputs" for="input-valor-investimento">Valor atual *</label>
                            <input class="input-grande" name="input-valor-investimento" id="input-valor-investimento" type="number" placeholder="R$">
                        </div>
                    </div>
                </div>
                <div style="display:flex; justify-content: center; align-items: center; gap:15px;">
                    <button type="submit" class="botao-editar"> Salvar </button>
                    <a href="{% url 'ativos' %}" class="botao-excluir"> Cancelar </a>
                </div>
            </form>
        </main>
    </div>
    
    <script src="{% static 'assets/js/novo patrimonio.js' %}"></script>
    <script src="{% static 'assets/js/geral.js' %}"></script>
{% endblock content %}
